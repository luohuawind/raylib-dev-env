name: Publish wiki
on:
  push:
    branches: [main]
    paths:
      - .github/wiki/**
      - .github/workflows/publish-wiki.yml
  workflow_dispatch:

concurrency:
  group: wiki
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check_changes:
    name: Determine changed paths
    runs-on: ubuntu-latest
    outputs:
      wiki: ${{ steps.filter.outputs.wiki }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            wiki:
              - '.github/wiki/**'

  wiki:
    needs: check_changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.check_changes.outputs.wiki == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wiki helpers
        uses: photodow/wiki-helpers@1.2.4
        with:
          rootPath: ./.github/wiki
          buildPath: ./.github/wiki

      - uses: spenserblack/actions-wiki@main
        with:
          path: .github/wiki
          commit-message: "Publish wiki from source"
